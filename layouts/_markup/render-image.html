{{- $dest := .Destination -}}
{{- $bp := (urls.Parse site.BaseURL).Path | strings.TrimSuffix "/" -}}
{{- if and (strings.HasPrefix $dest "/") (not (strings.HasPrefix $dest "//")) -}}
  {{- $dest = printf "%s%s" $bp $dest -}}
{{- end -}}<img src="{{ $dest | safeURL }}" alt="{{ .Text }}"{{ with .Title }} title="{{ . }}"{{ end }}/>
