<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>NB6BOY — Leaderboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    /* =============================================
       ROOT & RESET
    ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* Force dark mode always — this is an arcade CRT, it's never light */
    :root {
      color-scheme: dark;
      --green:   #00ff88;
      --green2:  #00cc66;
      --green3:  #004422;
      --amber:   #ffcc00;
      --red:     #ff3355;
      --dim:     #002211;
      --bg:      #050e08;
      --card:    #080f0b;
      --border:  #00331a;
      --glow:    0 0 8px #00ff8866, 0 0 24px #00ff8822;
      --glow-lg: 0 0 16px #00ff88aa, 0 0 48px #00ff8833;
      --scan-size: 3px;
    }

    html {
      scroll-behavior: smooth;
      background: #050e08; /* prevents white flash before body paints */
    }

    body {
      background: var(--bg);
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* =============================================
       SCANLINES OVERLAY
    ============================================= */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent calc(var(--scan-size) - 1px),
        rgba(0,0,0,0.18) calc(var(--scan-size) - 1px),
        rgba(0,0,0,0.18) var(--scan-size)
      );
      pointer-events: none;
      z-index: 1000;
    }

    /* Vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.75) 100%);
      pointer-events: none;
      z-index: 999;
    }

    /* =============================================
       HEADER
    ============================================= */
    header {
      text-align: center;
      padding: 3rem 1rem 1.5rem;
      position: relative;
    }

    .logo {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(1.2rem, 4vw, 2.4rem);
      color: var(--green);
      text-shadow: var(--glow-lg);
      letter-spacing: 0.08em;
      animation: flicker 8s infinite;
    }

    .logo span {
      color: var(--amber);
      text-shadow: 0 0 12px #ffcc00aa, 0 0 40px #ffcc0033;
    }

    .tagline {
      font-size: 0.7rem;
      color: var(--green2);
      margin-top: 0.8rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0.7;
    }

    .status-bar {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-top: 1.4rem;
      font-size: 0.6rem;
      color: var(--green2);
      letter-spacing: 0.12em;
    }

    .status-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: var(--glow);
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    .status-dot.amber { background: var(--amber); box-shadow: 0 0 8px #ffcc0088; }
    .status-dot.red   { background: var(--red);   box-shadow: 0 0 8px #ff335588; }

    /* =============================================
       DIVIDER
    ============================================= */
    .divider {
      width: 90%;
      max-width: 1000px;
      margin: 1rem auto;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--green2), transparent);
      box-shadow: 0 0 8px #00ff8844;
    }

    /* =============================================
       CONTROLS BAR
    ============================================= */
    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.6rem;
      padding: 0.8rem 1rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .filter-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.45rem;
      padding: 0.5rem 0.85rem;
      background: transparent;
      color: var(--green2);
      border: 1px solid var(--border);
      cursor: pointer;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: all 0.15s;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: var(--green3);
      color: var(--green);
      border-color: var(--green2);
      box-shadow: var(--glow);
    }

    .search-wrap {
      position: relative;
      flex: 1 1 200px;
      max-width: 300px;
    }

    .search-wrap::before {
      content: '▶';
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.5rem;
      color: var(--green2);
    }

    .search-input {
      width: 100%;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      padding: 0.5rem 0.5rem 0.5rem 1.6rem;
      background: var(--card);
      color: var(--green);
      border: 1px solid var(--border);
      outline: none;
      letter-spacing: 0.06em;
    }

    .search-input:focus {
      border-color: var(--green2);
      box-shadow: var(--glow);
    }

    .search-input::placeholder { color: var(--green3); opacity: 1; }

    .refresh-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.45rem;
      padding: 0.5rem 0.9rem;
      background: var(--green3);
      color: var(--green);
      border: 1px solid var(--green2);
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.15s;
    }

    .refresh-btn:hover { box-shadow: var(--glow-lg); }
    .refresh-btn:active { transform: scale(0.96); }
    .refresh-btn.spinning { animation: spin 0.6s linear; }

    /* =============================================
       GRID
    ============================================= */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 1.2rem;
      max-width: 1100px;
      margin: 0.5rem auto 3rem;
      padding: 0 1.2rem;
    }

    /* =============================================
       GAME CARD
    ============================================= */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      cursor: default;
      transition: border-color 0.2s, transform 0.2s;
      animation: fadeIn 0.4s both;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(to right, transparent, var(--green2), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .card:hover {
      border-color: var(--green2);
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(0,255,136,0.08);
    }

    .card:hover::before { opacity: 1; }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1rem 0.6rem;
      border-bottom: 1px solid var(--border);
    }

    .game-icon {
      font-size: 1.2rem;
      width: 2rem;
      text-align: center;
    }

    .game-name {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.42rem;
      color: var(--green);
      letter-spacing: 0.04em;
      flex: 1;
      padding: 0 0.6rem;
      line-height: 1.6;
    }

    .game-tag {
      font-size: 0.5rem;
      padding: 0.2rem 0.4rem;
      border: 1px solid;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .game-tag.solo  { color: #00aaff; border-color: #00aaff44; }
    .game-tag.vs    { color: var(--amber); border-color: #ffcc0044; }
    .game-tag.hard  { color: var(--red); border-color: #ff335544; }

    .card-body {
      padding: 1rem;
    }

    .score-row {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
    }

    .score-label {
      font-size: 0.55rem;
      color: var(--green2);
      letter-spacing: 0.12em;
      opacity: 0.7;
    }

    .score-value {
      font-family: 'Press Start 2P', monospace;
      font-size: 1.3rem;
      color: var(--green);
      text-shadow: var(--glow);
      letter-spacing: 0.04em;
      transition: all 0.3s;
    }

    .score-value.zero {
      color: var(--green3);
      text-shadow: none;
      font-size: 1rem;
      opacity: 0.5;
    }

    .score-value.loading {
      animation: blink 1s step-end infinite;
      font-size: 0.7rem;
      opacity: 0.5;
    }

    .score-bar-wrap {
      margin-top: 0.8rem;
      height: 4px;
      background: var(--dim);
      position: relative;
      overflow: hidden;
    }

    .score-bar {
      height: 100%;
      background: linear-gradient(to right, var(--green3), var(--green2));
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      width: 0%;
    }

    .card-footer {
      padding: 0.5rem 1rem 0.7rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border);
    }

    .ts-label {
      font-size: 0.45rem;
      color: var(--green3);
      letter-spacing: 0.08em;
      opacity: 0.6;
    }

    .rank-badge {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.35rem;
      padding: 0.25rem 0.5rem;
      background: var(--green3);
      color: var(--green2);
      letter-spacing: 0.06em;
    }

    .rank-badge.gold   { background: #332200; color: var(--amber); }
    .rank-badge.silver { background: #1a1a22; color: #aaaacc; }
    .rank-badge.bronze { background: #221100; color: #cc8833; }

    /* =============================================
       EMPTY / ERROR / LOADING STATES
    ============================================= */
    .state-box {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 1rem;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.6rem;
      color: var(--green2);
      letter-spacing: 0.1em;
      line-height: 2.5;
      opacity: 0.6;
    }

    .state-box .icon { font-size: 2.5rem; display: block; margin-bottom: 1rem; }

    /* =============================================
       TOP BAR STATS
    ============================================= */
    .stats-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2rem;
      max-width: 1100px;
      margin: 0 auto 0.5rem;
      padding: 0.6rem 1.2rem;
      font-size: 0.55rem;
      color: var(--green2);
      letter-spacing: 0.12em;
    }

    .stat-item strong {
      font-family: 'Press Start 2P', monospace;
      color: var(--green);
      font-size: 0.7rem;
      display: block;
      text-shadow: var(--glow);
    }

    /* =============================================
       FOOTER
    ============================================= */
    footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.5rem;
      color: var(--green3);
      letter-spacing: 0.15em;
      opacity: 0.5;
      border-top: 1px solid var(--border);
    }

    /* =============================================
       ANIMATIONS
    ============================================= */
    @keyframes flicker {
      0%,95%,97%,100% { opacity:1; }
      96%             { opacity:0.85; }
      96.5%           { opacity:1; }
    }

    @keyframes pulse {
      0%,100% { opacity:1; }
      50%     { opacity:0.3; }
    }

    @keyframes blink {
      0%,100% { opacity:1; }
      50%     { opacity:0; }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity:0; transform: translateY(12px); }
      to   { opacity:1; transform: translateY(0); }
    }

    @keyframes scoreUp {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.18); color: var(--amber); text-shadow: 0 0 16px #ffcc00; }
      100% { transform: scale(1); }
    }

    .score-updated { animation: scoreUp 0.6s ease; }

    /* =============================================
       RESPONSIVE
    ============================================= */
    @media (max-width: 480px) {
      .logo { font-size: 1rem; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">NB6<span>BOY</span></div>
    <div class="tagline">High Score Leaderboard — Live</div>
    <div class="status-bar">
      <span id="conn-status"><span class="status-dot amber" id="conn-dot"></span><span id="conn-text">CONNECTING...</span></span>
      <span><span class="status-dot" id="live-dot"></span>LIVE DATA</span>
      <span id="last-update-wrap" style="display:none"><span class="status-dot"></span><span id="last-update-text">—</span></span>
    </div>
  </header>

  <div class="divider"></div>

  <!-- SUMMARY STATS -->
  <div class="stats-row">
    <div class="stat-item"><strong id="stat-games">—</strong>GAMES TRACKED</div>
    <div class="stat-item"><strong id="stat-scores">—</strong>SCORES SET</div>
    <div class="stat-item"><strong id="stat-top">—</strong>TOP SCORE</div>
    <div class="stat-item"><strong id="stat-top-game">—</strong>BEST GAME</div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="filter-btn active" data-filter="all">ALL</button>
    <button class="filter-btn" data-filter="solo">SOLO</button>
    <button class="filter-btn" data-filter="vs">2P</button>
    <button class="filter-btn" data-filter="set">SCORE SET</button>
    <input class="search-input" type="text" placeholder="SEARCH GAMES..." id="search" />
    <button class="refresh-btn" id="refresh-btn">↻ REFRESH</button>
  </div>

  <!-- CARD GRID -->
  <div class="grid" id="grid">
    <div class="state-box"><span class="icon">◈</span>LOADING SCORES...</div>
  </div>

  <div class="divider"></div>

  <footer>NB6BOY MULTI-GAME CONSOLE &nbsp;|&nbsp; SCORES UPDATED IN REAL-TIME &nbsp;|&nbsp; BUILT BY FABLAB</footer>

  <script>
    // =============================================
    // CONFIG
    // =============================================
    const FIREBASE_HOST = 'https://nb6boy-scores-default-rtdb.asia-southeast1.firebasedatabase.app';

    const GAMES = [
      { key: 'snake_wall',    name: 'Snake (Wall)',       icon: '🐍', tag: 'solo' },
      { key: 'snake_wrap',    name: 'Snake (Wrap)',       icon: '🐍', tag: 'solo' },
      { key: 'tetris',        name: 'Tetris',             icon: '🟦', tag: 'solo' },
      { key: 'flappy_easy',   name: 'Flappy Bird Easy',  icon: '🐤', tag: 'solo' },
      { key: 'flappy_hard',   name: 'Flappy Bird Hard',  icon: '🐦', tag: 'hard' },
      { key: 'asteroids',     name: 'Asteroids Hard',    icon: '☄️', tag: 'hard' },
      { key: 'pacman_easy',   name: 'Pac-Man Easy',      icon: '👻', tag: 'solo' },
      { key: 'pacman_hard',   name: 'Pac-Man Hard',      icon: '👾', tag: 'hard' },
      { key: 'space_shooter', name: 'Space Shooter',     icon: '🚀', tag: 'solo' },
      { key: 'breakout',      name: 'Breakout',          icon: '🧱', tag: 'solo' },
      { key: 'tictactoe_ai',  name: 'TicTacToe vs AI',  icon: '🤖', tag: 'hard' },
      { key: 'tictactoe_2p',  name: 'TicTacToe 2P',     icon: '❌', tag: 'vs'   },
      { key: 'pong',          name: 'Pong',              icon: '🏓', tag: 'vs'   },
      { key: 'tug_of_war',    name: 'Tug of War 2P',    icon: '🪢', tag: 'vs'   },
      { key: 'checkers_ai',   name: 'Checkers vs AI',   icon: '♟️', tag: 'hard' },
      { key: 'checkers_2p',   name: 'Checkers 2P',      icon: '🔲', tag: 'vs'   },
      { key: 'minesweeper',   name: 'Minesweeper',      icon: '💣', tag: 'solo' },
      { key: 'dino_run',      name: 'Dino Run',         icon: '🦕', tag: 'solo' },
    ];

    // =============================================
    // STATE
    // =============================================
    let scores = {};           // key -> { highScore, timestamp }
    let currentFilter = 'all';
    let currentSearch  = '';
    let prevScores = {};

    // =============================================
    // FIREBASE FETCH
    // =============================================
    async function fetchScores() {
      try {
        const res = await fetch(`${FIREBASE_HOST}/scores.json`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        setConnStatus('online');
        document.getElementById('last-update-wrap').style.display = '';
        document.getElementById('last-update-text').textContent =
          'UPDATED ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

        prevScores = { ...scores };
        scores = data || {};
        render();
        updateStats();
      } catch (err) {
        setConnStatus('error');
        console.error('Firebase fetch error:', err);
      }
    }

    function setConnStatus(state) {
      const dot  = document.getElementById('conn-dot');
      const text = document.getElementById('conn-text');
      if (state === 'online') {
        dot.className  = 'status-dot';
        text.textContent = 'CONNECTED';
      } else if (state === 'error') {
        dot.className  = 'status-dot red';
        text.textContent = 'OFFLINE';
      } else {
        dot.className  = 'status-dot amber';
        text.textContent = 'CONNECTING...';
      }
    }

    // =============================================
    // STATS
    // =============================================
    function updateStats() {
      const tracked  = GAMES.length;
      const set      = GAMES.filter(g => getScore(g.key) > 0).length;
      const allVals  = GAMES.map(g => getScore(g.key));
      const topScore = Math.max(...allVals, 0);
      const topGame  = GAMES.find(g => getScore(g.key) === topScore);

      document.getElementById('stat-games').textContent  = tracked;
      document.getElementById('stat-scores').textContent = set;
      document.getElementById('stat-top').textContent    = topScore > 0 ? topScore : '—';
      document.getElementById('stat-top-game').textContent = topGame && topScore > 0 ? topGame.name.toUpperCase() : '—';
    }

    // =============================================
    // HELPERS
    // =============================================
    function getScore(key) {
      const entry = scores[key];
      if (!entry) return 0;
      if (typeof entry === 'number') return entry;
      return entry.highScore ?? entry.score ?? 0;
    }

    function getTimestamp(key) {
      const entry = scores[key];
      if (!entry || typeof entry === 'number') return null;
      return entry.timestamp ?? null;
    }

    function formatTs(ts) {
      if (!ts) return 'NO RECORD';
      // Firebase timestamps are device millis (not epoch), so we can't convert to date
      // Just show the raw uptime-based value or omit it
      return 'RECORDED';
    }

    function scoresByRank() {
      return GAMES
        .map(g => ({ ...g, score: getScore(g.key) }))
        .filter(g => g.score > 0)
        .sort((a, b) => b.score - a.score);
    }

    function getRankBadge(key) {
      const ranked = scoresByRank();
      const idx = ranked.findIndex(g => g.key === key);
      if (idx === 0) return { label: '🥇 #1',  cls: 'gold'   };
      if (idx === 1) return { label: '🥈 #2',  cls: 'silver' };
      if (idx === 2) return { label: '🥉 #3',  cls: 'bronze' };
      if (idx >= 0)  return { label: `#${idx + 1}`, cls: '' };
      return null;
    }

    // Global max for relative bar
    function globalMax() {
      return Math.max(...GAMES.map(g => getScore(g.key)), 1);
    }

    // =============================================
    // RENDER
    // =============================================
    function render() {
      const grid  = document.getElementById('grid');
      const max   = globalMax();

      const filtered = GAMES.filter(g => {
        if (currentFilter === 'solo' && g.tag !== 'solo') return false;
        if (currentFilter === 'vs'   && g.tag !== 'vs')   return false;
        if (currentFilter === 'hard' && g.tag !== 'hard') return false;
        if (currentFilter === 'set'  && getScore(g.key) === 0) return false;
        if (currentSearch) {
          const q = currentSearch.toLowerCase();
          if (!g.name.toLowerCase().includes(q) && !g.key.includes(q)) return false;
        }
        return true;
      });

      if (filtered.length === 0) {
        grid.innerHTML = `<div class="state-box"><span class="icon">◉</span>NO GAMES FOUND</div>`;
        return;
      }

      grid.innerHTML = filtered.map((g, idx) => {
        const s      = getScore(g.key);
        const ts     = getTimestamp(g.key);
        const rank   = getRankBadge(g.key);
        const pct    = Math.round((s / max) * 100);
        const isNew  = prevScores[g.key] !== undefined && getScore(g.key) !== (typeof prevScores[g.key] === 'object' ? (prevScores[g.key]?.highScore ?? 0) : 0);

        const tagLabel = g.tag === 'solo' ? 'SOLO' : g.tag === 'vs' ? '2P' : 'HARD';
        const delay    = Math.min(idx * 40, 400);

        return `
        <div class="card" style="animation-delay:${delay}ms" data-key="${g.key}">
          <div class="card-header">
            <div class="game-icon">${g.icon}</div>
            <div class="game-name">${g.name}</div>
            <div class="game-tag ${g.tag}">${tagLabel}</div>
          </div>
          <div class="card-body">
            <div class="score-row">
              <div class="score-label">HIGH SCORE</div>
            </div>
            <div class="score-value ${s === 0 ? 'zero' : ''} ${isNew ? 'score-updated' : ''}" id="sv-${g.key}">
              ${s === 0 ? '- - -' : s}
            </div>
            <div class="score-bar-wrap">
              <div class="score-bar" id="bar-${g.key}" style="width:0%"></div>
            </div>
          </div>
          <div class="card-footer">
            <div class="ts-label">${formatTs(ts)}</div>
            ${rank ? `<div class="rank-badge ${rank.cls}">${rank.label}</div>` : ''}
          </div>
        </div>`;
      }).join('');

      // Animate bars after paint
      requestAnimationFrame(() => {
        filtered.forEach(g => {
          const s   = getScore(g.key);
          const pct = Math.round((s / max) * 100);
          const bar = document.getElementById(`bar-${g.key}`);
          if (bar) setTimeout(() => { bar.style.width = pct + '%'; }, 60);
        });
      });
    }

    // =============================================
    // EVENTS
    // =============================================
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();
      });
    });

    document.getElementById('search').addEventListener('input', e => {
      currentSearch = e.target.value.trim();
      render();
    });

    const refreshBtn = document.getElementById('refresh-btn');
    refreshBtn.addEventListener('click', () => {
      refreshBtn.classList.add('spinning');
      setTimeout(() => refreshBtn.classList.remove('spinning'), 600);
      fetchScores();
    });

    // =============================================
    // INIT + AUTO-REFRESH (30s)
    // =============================================
    fetchScores();
    setInterval(fetchScores, 30000);
  </script>
</body>
</html>
