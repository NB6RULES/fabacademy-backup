{{ define "main" }}
<div class="max-w-4xl mx-auto px-8 py-12 prose-neon">
  {{ if .Title }}<h1>{{ .Title }}</h1>{{ end }}
  {{ .Content }}
  {{ if .Paginator.Pages }}
  <ul>
    {{ range .Paginator.Pages }}
      <li><a href="{{ .Permalink }}">{{ .Title }}</a></li>
    {{ end }}
  </ul>
  {{ end }}
</div>
{{ end }}
